<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="AlbaBiz">
  <!-- AlbaBiz 'AB' monogram chip: cream A + gold B on a flag-red rounded tile,
       matching the app launcher icon and Play Store mark. -->
  <rect x="2" y="2" width="44" height="44" rx="11" fill="#C8102E"/>
  <text x="24" y="34" text-anchor="middle"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-weight="800" font-size="25" letter-spacing="-1.5">
    <tspan fill="#FAF7F2">A</tspan><tspan fill="#B8893A">B</tspan>
  </text>
</svg>
